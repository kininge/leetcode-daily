    <rect x="0" y="0" width="221.48427672955975" height="20" fill="#1cbaba" rx="4" /> 
    <rect x="225.48427672955975" y="0" width="285.7861635220126" height="20" fill="#ffb700" rx="4" />
    <rect x="515.2704402515724" y="0" width="60.729559748427675" height="20" fill="#f63737" rx="4" />
