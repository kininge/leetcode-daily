    <rect x="0" y="0" width="224.5581395348837" height="20" fill="#1cbaba" rx="4" /> 
    <rect x="228.5581395348837" y="0" width="277.39534883720927" height="20" fill="#ffb700" rx="4" />
    <rect x="509.953488372093" y="0" width="66.04651162790698" height="20" fill="#f63737" rx="4" />
  </g>
