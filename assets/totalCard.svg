<svg xmlns="http://www.w3.org/2000/svg" width="608" height="220" viewBox="0 0 608 220">
  <!-- card background -->
  <rect x="0" y="0" width="608" height="220" rx="8" fill="#282828" />
  
  <!-- All problem solved data -->
  <g transform="translate(280, 120)" text-anchor="middle">
    <!-- total problems solved -->
    <text font-size="70" font-weight="600" font-family="Inter, Arial, Helvetica, sans-serif" fill="#ffffff" dominant-baseline="end">122</text>
    <!-- total problems -->
    <text font-size="25" font-weight="600" font-family="Inter, Arial, Helvetica, sans-serif" fill="#767676" dominant-baseline="end" dx="100">/ 3647</text>
  </g>

  <!-- horizontal bar represents each section problem solved -->
  <g transform="translate(16, 184)">
    <rect x="0" y="0" width="228.13114754098362" height="20" fill="#1cbaba" rx="4" /> 
    <rect x="232.13114754098362" y="0" width="284" height="20" fill="#ffb700" rx="4" />
    <rect x="520.1311475409836" y="0" width="55.868852459016395" height="20" fill="#f63737" rx="4" />
  </g>
</svg>