<svg xmlns="http://www.w3.org/2000/svg" width="608" height="220" viewBox="0 0 608 220">
  <!-- card background -->
  <rect x="0" y="0" width="608" height="220" rx="8" fill="#282828" />
  
  <!-- All problem solved data -->
  <g transform="translate(280, 120)" text-anchor="middle">
    <!-- total problems solved -->
    <text font-size="70" font-weight="600" font-family="Inter, Arial, Helvetica, sans-serif" fill="#ffffff" dominant-baseline="end">129</text>
    <!-- total problems -->
